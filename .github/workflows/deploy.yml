name: Deploy to EC2

on:
  push:
    branches: [ master, main ]
    paths:
      - 'api/**'
      - 'package*.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      SECURITY_GROUP_ID: sg-0a04fb0571125faf2

    steps:
    - uses: actions/checkout@v3

    - name: Configure AWS credentials (optional - for security group management)
      uses: aws-actions/configure-aws-credentials@v4
      continue-on-error: true
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Get runner IP address
      id: ip
      continue-on-error: true
      uses: haythem/public-ip@v1.3

    - name: Whitelist runner IP address
      continue-on-error: true
      run: |
        aws ec2 authorize-security-group-ingress \
          --group-id ${{ env.SECURITY_GROUP_ID }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32 \
          --output text || true

    - name: Setup SSH Agent
      uses: webfactory/ssh-agent@v0.9.0
      continue-on-error: true
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

    - name: Add known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H 3.21.14.188 >> ~/.ssh/known_hosts

    - name: Deploy to EC2
      run: |
        echo "Deploying to EC2..."
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ubuntu@3.21.14.188 << 'ENDSSH'
          set -e

          # Clone or navigate to app directory
          if [ ! -d "/home/ubuntu/radscheduler" ]; then
            echo "Cloning repository..."
            cd /home/ubuntu
            git clone https://github.com/CurtisStartsCoding/radscheduler.git
            cd radscheduler
          else
            cd /home/ubuntu/radscheduler
            # Pull latest code
            echo "Pulling latest code..."
            git pull origin master || git pull origin main
          fi

          # Install/update dependencies
          echo "Installing API dependencies..."
          cd api
          npm ci --production

          # Run database migrations
          echo "Running database migrations..."
          if [ -d "scripts" ]; then
            for sql_file in scripts/*.sql; do
              if [ -f "$sql_file" ]; then
                echo "Running $sql_file..."
                psql $DATABASE_URL -f $sql_file || true
              fi
            done
          fi

          # Restart application with PM2
          echo "Restarting application..."
          pm2 restart radscheduler-api || pm2 start src/server.js --name radscheduler-api
          pm2 save

          echo "Deployment complete!"
        ENDSSH

    - name: Revoke runner IP address
      if: always()
      continue-on-error: true
      run: |
        aws ec2 revoke-security-group-ingress \
          --group-id ${{ env.SECURITY_GROUP_ID }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32 \
          --output text || true